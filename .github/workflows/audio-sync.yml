name: Audio Consistency Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check-audio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install edge-tts

      - name: Verify all docs have audio
        run: |
          python3 scripts/generate-audio.py
          
          # Check if there are any uncommitted changes (new audio files or updated audio-map.json)
          if [[ -n $(git status --porcelain) ]]; then
            echo "::error::Audio files are out of sync with the documentation!"
            echo "Please run 'python3 scripts/generate-audio.py' locally and commit the changes."
            echo "Uncommitted changes:"
            git status --porcelain
            exit 1
          fi
